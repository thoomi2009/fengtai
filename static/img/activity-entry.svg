<svg width="388" height="120" viewBox="0 0 388 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0066CC"/>
      <stop offset="100%" style="stop-color:#0088DD"/>
    </linearGradient>
    <linearGradient id="shineGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="388" height="120" rx="12" fill="url(#bgGradient)"/>

  <!-- Decorative circles -->
  <circle cx="320" cy="60" r="50" fill="rgba(255,255,255,0.1)"/>
  <circle cx="340" cy="80" r="30" fill="rgba(255,255,255,0.08)"/>

  <!-- Icon - Calendar with event -->
  <g transform="translate(30, 25)">
    <!-- Calendar base -->
    <rect x="0" y="10" width="50" height="45" rx="6" fill="#ffffff"/>
    <!-- Calendar header -->
    <rect x="0" y="10" width="50" height="14" rx="6" fill="#E8F4FD"/>
    <rect x="0" y="17" width="50" height="7" fill="#E8F4FD"/>
    <!-- Calendar rings -->
    <rect x="8" y="5" width="6" height="10" rx="3" fill="#ffffff"/>
    <rect x="36" y="5" width="6" height="10" rx="3" fill="#ffffff"/>
    <!-- Event dot -->
    <circle cx="14" cy="38" r="4" fill="#FF9900"/>
    <circle cx="25" cy="38" r="4" fill="#00CC66"/>
    <circle cx="36" cy="38" r="4" fill="#FF9900"/>
  </g>

  <!-- Main Text -->
  <text x="100" y="55" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="32" font-weight="bold" fill="#ffffff">活动报名</text>

  <!-- Subtitle -->
  <text x="100" y="82" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="14" fill="rgba(255,255,255,0.8)">精彩活动 期待参与</text>

  <!-- Arrow icon -->
  <g transform="translate(330, 48)">
    <circle cx="12" cy="12" r="12" fill="rgba(255,255,255,0.2)"/>
    <path d="M10 8L14 12L10 16" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Shine effect -->
  <ellipse cx="194" cy="0" rx="120" ry="80" fill="url(#shineGradient)"/>
</svg>