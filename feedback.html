<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>意见建议 - 丰台内外贸一体化服务平台</title>
  <link rel="stylesheet" href="static/css/common.css">
  <link rel="stylesheet" href="static/css/page.css">
</head>
<body>
  <header class="nav-bar">
    <div class="nav-bar-content">
      <a href="profile.html" class="nav-bar-back"></a>
      <h1 class="nav-bar-title">意见建议</h1>
    </div>
  </header>

  <main class="page">
    <div class="feedback-container">
      <form class="feedback-form" id="feedbackForm">
        <div class="form-group">
          <label class="form-label required">反馈类型</label>
          <select class="form-select" name="type" required>
            <option value="">请选择反馈类型</option>
            <option value="功能建议">功能建议</option>
            <option value="问题反馈">问题反馈</option>
            <option value="内容建议">内容建议</option>
            <option value="其他">其他</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label required">反馈内容</label>
          <textarea class="form-textarea" name="content" placeholder="请详细描述您的意见或建议" required></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">联系方式（选填）</label>
          <input type="text" class="form-input" name="contact" placeholder="手机号或邮箱，方便我们联系您">
        </div>
        <button type="submit" class="btn btn-primary btn-block">提交反馈</button>
      </form>
    </div>
  </main>

  <nav class="bottom-nav">

      </svg>
      <span>行业资讯</span>
    </a>
    <a href="services.html" class="bottom-nav-item">
