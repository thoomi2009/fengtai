<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="format-detection" content="telephone=no">
  <title>个人中心 - 丰台内外贸一体化服务平台</title>
  <link rel="stylesheet" href="static/css/common.css">
  <link rel="stylesheet" href="static/css/profile.css">
</head>
<body>
  <!-- Navigation Header -->
  <header class="nav-bar">
    <div class="nav-bar-content">
      <h1 class="nav-bar-title">个人中心</h1>
    </div>
  </header>

  <!-- Main Content -->
  <main class="page profile-page">
    <!-- User Profile Card -->
    <div class="profile-card" id="loggedInProfile">
      <div class="profile-header">
        <div class="profile-avatar">
          <img src="static/images/default-avatar.png" alt="用户头像">
        </div>
        <div class="profile-info">
          <h2 class="profile-name">外贸企业用户</h2>
          <p class="profile-phone">138****8888</p>
        </div>
      </div>
    </div>

    <!-- Login Prompt Card (Hidden when logged in) -->
    <div class="login-prompt-card hidden" id="loginPrompt">
      <div class="login-prompt-content">
        <div class="login-prompt-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <p class="login-prompt-text">登录后查看更多内容</p>
        <a href="login.html" class="btn btn-primary">立即登录</a>
      </div>
    </div>

    <!-- Function Menu List -->
    <div class="menu-section">
      <div class="menu-list">
        <a href="my-favorites.html" class="menu-item">
          <div class="menu-item-icon menu-icon-favorites">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

          <svg class="menu-item-arrow" width="6" height="6" viewBox="0 0 6 6">
            <path d="M1 1L5 3L1 5" fill="none" stroke="currentColor" stroke-width="1"/>
          </svg>
        </a>

        <a href="my-registrations.html" class="menu-item">
          <div class="menu-item-icon menu-icon-registrations">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/>
              <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
            </svg>
          </div>
          <span class="menu-item-title">我的报名</span>
          <svg class="menu-item-arrow" width="6" height="6" viewBox="0 0 6 6">
            <path d="M1 1L5 3L1 5" fill="none" stroke="currentColor" stroke-width="1"/>
          </svg>
        </a>

        <a href="my-messages.html" class="menu-item">
          <div class="menu-item-icon menu-icon-messages">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
            </svg>
          </div>
          <span class="menu-item-title">我的留言</span>
          <svg class="menu-item-arrow" width="6" height="6" viewBox="0 0 6 6">
            <path d="M1 1L5 3L1 5" fill="none" stroke="currentColor" stroke-width="1"/>
          </svg>
        </a>

        <a href="my-applications.html" class="menu-item">
          <div class="menu-item-icon menu-icon-applications">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>

              <path d="M9 15h6"/>

            <path d="M1 1L5 3L1 5" fill="none" stroke="currentColor" stroke-width="1"/>

        <a href="about.html" class="menu-item">

            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

          <div class="menu-item-icon menu-icon-feedback">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

            </svg>

          <span class="menu-item-title">意见建议</span>
          <svg class="menu-item-arrow" width="6" height="6" viewBox="0 0 6 6">
            <path d="M1 1L5 3L1 5" fill="none" stroke="currentColor" stroke-width="1"/>
          </svg>
        </a>

        <a href="customer-service.html" class="menu-item">
          <div class="menu-item-icon menu-icon-service">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/>

          <svg class="menu-item-arrow" width="6" height="6" viewBox="0 0 6 6">
            <path d="M1 1L5 3L1 5" fill="none" stroke="currentColor" stroke-width="1"/>
          </svg>
        </a>
      </div>

    <div class="logout-section" id="logoutSection">
      <button class="btn btn-outline btn-block" id="logoutBtn">退出登录</button>

    <a href="classroom-list.html" class="bottom-nav-item">

        <path d="M6 12v5c3 3 9 3 12 0v-5"/>

    <a href="profile.html" class="bottom-nav-item active">
      <svg class="bottom-nav-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span>个人中心</span>
