<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="format-detection" content="telephone=no">
  <title>登录 - 丰台内外贸一体化服务平台</title>
  <link rel="stylesheet" href="static/css/common.css">
  <link rel="stylesheet" href="static/css/auth.css">
</head>
<body>
  <!-- Login Page -->
  <div class="auth-page">
    <!-- Logo & Title -->
    <div class="auth-header">
      <div class="auth-logo">
        <img src="static/images/logo.png" alt="丰台外贸">
      </div>
      <h1 class="auth-title">丰台内外贸一体化服务平台</h1>
      <p class="auth-subtitle">欢迎登录</p>
    </div>

    <!-- Login Form -->
    <div class="auth-form-card">
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="sms">验证码登录</button>
        <button class="auth-tab" data-tab="password">密码登录</button>
      </div>

      <!-- SMS Login Form -->
      <form class="auth-form" id="smsLoginForm">
        <div class="form-group">
          <label class="form-label required">手机号</label>
          <input type="tel" class="form-input" name="phone" placeholder="请输入手机号" required>
        </div>
        <div class="form-group">
          <label class="form-label required">验证码</label>
          <div class="verify-code-group">
            <input type="text" class="form-input" name="code" placeholder="请输入验证码" required>
            <button type="button" class="verify-code-btn" id="getCodeBtn">获取验证码</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block">登录</button>
      </form>

      <!-- Password Login Form (Hidden) -->
      <form class="auth-form hidden" id="passwordLoginForm">
        <div class="form-group">
          <label class="form-label required">手机号</label>
          <input type="tel" class="form-input" name="phone" placeholder="请输入手机号" required>
        </div>
        <div class="form-group">
          <label class="form-label required">密码</label>
          <div class="password-input-group">
            <input type="password" class="form-input" name="password" placeholder="请输入密码" required>
            <button type="button" class="password-toggle" id="passwordToggle">
              <svg class="eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="eye-closed hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="form-group flex-between">
          <label class="checkbox-label">
            <input type="checkbox" name="remember">
            <span>记住登录状态</span>
          </label>
          <a href="forgot-password.html" class="link-text">忘记密码?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-block">登录</button>
      </form>

      <!-- Register Link -->
      <div class="auth-footer">
        <span class="auth-footer-text">还没有账号?</span>
        <a href="register.html" class="link-text">立即注册</a>
      </div>
    </div>

    <!-- Agreement -->
    <div class="auth-agreement">
      <label class="checkbox-label">
        <input type="checkbox" id="agreeCheckbox" checked>
        <span>我已阅读并同意</span>
      </label>
      <a href="#" class="link-text">《用户协议》</a>
      <span>和</span>
      <a href="#" class="link-text">《隐私政策》</a>
    </div>
  </div>

  <script src="static/js/auth.js"></script>
</body>
</html>
